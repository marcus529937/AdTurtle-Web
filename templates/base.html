<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}台股前 50{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", "PingFang TC", sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #1a1a1a;
    }
    nav {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    nav a { color: #80cbc4; text-decoration: none; font-weight: 600; }
    nav a:hover { text-decoration: underline; }
    main { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #1a1a2e; color: #fff; padding: 10px 12px; text-align: left; font-size: 13px; }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f9f9; }
    a.stock-link { color: #00695c; font-weight: 600; text-decoration: none; }
    a.stock-link:hover { text-decoration: underline; }
    .signal-BUY  { color: #c62828; font-weight: 700; }
    .signal-SELL { color: #0277bd; font-weight: 700; }
    .signal-HOLD { color: #616161; }
    .signal-NO_DATA, .signal-ERROR, .signal-PENDING { color: #9e9e9e; font-style: italic; }
    .err-detail { font-size: 11px; color: #e53935; margin-top: 3px; word-break: break-all; }
    .summary-bar {
      display: flex; gap: 16px; flex-wrap: wrap;
      background: #fff; border-radius: 8px; padding: 14px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px; font-size: 13px;
    }
    .summary-bar span { color: #555; }
    .summary-bar strong { color: #1a1a2e; font-size: 15px; }
  </style>
</head>
<body>
  <nav>
    <a href="/">台股市值前 50</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
